# ─── cmux-like features ──────────────────────────────────────────────────────
# Pane borders: rich info for Claude windows only
set -g pane-border-format '#{?@cmux, #{pane_index} #(~/.tmux/cmux/pane-info.sh #{pane_id}) , #{pane_index} }'

# Refresh status bar frequently
set -g status-interval 5

# Claude Code workspace keybindings (prefix + C for Claude)
bind C display-popup -w 50 -h 5 -E 'read -p "  Workspace name: " name; ~/.tmux/cmux/workspace.sh new "$name"'
bind M run-shell 'tmux display-popup -w 120 -h 30 -E "~/.tmux/cmux/workspace.sh menu #{pane_id}"'

# Quick workspace picker popup
bind W run-shell 'tmux display-popup -w 120 -h 30 -E "~/.tmux/cmux/workspace.sh pick #{pane_id}"'

# Start/stop the notification watcher
bind N display-popup -w 50 -h 12 -E '\
  echo "  Claude Notification Watcher"; \
  echo "  ───────────────────────────"; \
  ~/.tmux/cmux/claude-watch.sh status; \
  echo ""; \
  echo "  s) Start watcher"; \
  echo "  x) Stop watcher"; \
  echo "  q) Close"; \
  echo ""; \
  read -p "  Choice: " c; \
  case "$c" in \
    s) ~/.tmux/cmux/claude-watch.sh start ;; \
    x) ~/.tmux/cmux/claude-watch.sh stop ;; \
  esac'

# Auto-start the notification watcher when tmux starts
set-hook -g session-created 'run-shell -b "~/.tmux/cmux/claude-watch.sh start"'

# Notification message duration
set -g display-time 750
# ─── end cmux ────────────────────────────────────────────────────────────────
